name: Build wheels

on:
  push:
    paths-ignore:
      - ".gitignore"
      - "AUTHORS.TXT"
      - "COPYING"
      - "COPYING.LGPL2"
      - "COPYING_GLIB"
      - "CREDITS.TXT"
      - "ChangeLog"
      - "README.md"
      - "docs/**"
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-2019, macos-13, macos-14 ]

    steps:
      - uses: actions/checkout@v4

      - name: '🛠️ Add msbuild to PATH'
        if: matrix.os == 'windows-2019'
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '16.5'

      - name: '🛠️ Win build dependencies'
        if: matrix.os == 'windows-2019'
        shell: bash
        run: |
          choco install ninja cmake

      - name: '🛠️ macOS dependencies'
        if: contains(matrix.os, 'macos')
        run: |
          brew install ninja

      - name: '🛠️ Set up MSVC x64'
        if: matrix.os == 'windows-2019'
        uses: ilammy/msvc-dev-cmd@v1

      - name: '🛠️ Set up QEMU'
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: '🚧 cibuildwheel run - Linux'
        if: matrix.os == 'ubuntu-latest'
        uses: pypa/cibuildwheel@v2.21.2
        env:
          CIBW_BUILD_FRONTEND: build
          # CIBW_SKIP: '*36*'
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_BUILD: 'cp38*'
          CIBW_TEST_COMMAND: |
            cd {package}/tests/
            sh sample_all.sh
        with:
          package-dir: bindings/python
          output-dir: wheelhouse
#
#      - name: '🚧 cibuildwheel run - Windows'
#        if: matrix.os == 'windows-2019'
#        uses: pypa/cibuildwheel@v2.21.2
#        env:
#          CIBW_BUILD_FRONTEND: build
#          # CIBW_SKIP: '*36*'
#          CIBW_ARCHS_WINDOWS: "AMD64"
#          CIBW_BUILD: 'cp37*'
#        with:
#          package-dir: bindings/python
#          output-dir: wheelhouse
#
#      - name: '🚧 cibuildwheel run - macos x86_84'
#        if: matrix.os == 'macos-13'
#        uses: pypa/cibuildwheel@v2.21.2
#        env:
#          CIBW_BUILD_FRONTEND: build
#          # CIBW_SKIP: '*36*'
#          CIBW_BUILD: 'cp38*'
#        with:
#          package-dir: bindings/python
#          output-dir: wheelhouse
#
#      - name: '🚧 cibuildwheel run - macos arm64'
#        if: matrix.os == 'macos-14'
#        uses: pypa/cibuildwheel@v2.21.2
#        env:
#          CIBW_BUILD_FRONTEND: build
#          # CIBW_SKIP: '*36* *37*'
#          CIBW_BUILD: 'cp38*'
#          CIBW_REPAIR_WHEEL_COMMAND: ''
#        with:
#          package-dir: bindings/python
#          output-dir: wheelhouse

      # we re-tag the older python3 version wheel with py2 tag. Hacky but it works...
      - name: '🚧 Python 2.7 wheels re-tagging - Windows'
        if: matrix.os == 'windows-2019'
        run: |
          python -m pip install -U pip wheel && Get-ChildItem -Path wheelhouse/ -Filter *cp37*.whl | Foreach-Object {
            python -m wheel tags --python-tag='py2' --abi-tag=none $_.FullName
          }
      - name: '🚧 Python 2.7 wheels re-tagging - Non-Windows'
        if: matrix.os != 'windows-2019'
        env:
          PIP_BREAK_SYSTEM_PACKAGES: 1
        run: |
          python3 -m pip install -U pip wheel && python3 -m wheel tags --python-tag='py2' --abi-tag=none wheelhouse/*cp38*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
