name: Build wheels with cibuildwheel

on:
  push:
    paths-ignore:
      - ".gitignore"
      - "AUTHORS.TXT"
      - "COPYING"
      - "COPYING.LGPL2"
      - "COPYING_GLIB"
      - "CREDITS.TXT"
      - "ChangeLog"
      - "README.md"
      - "docs/**"
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # TODO: Check wheels for i686. Segfault error during pytest execution...
          # - { os: ubuntu-latest, arch: i686 }
          # x86_64 - manylinux
          - { os: ubuntu-latest, arch: x86_64, tagver: '37', tagtype: 'manylinux', tagrun: ${{ startsWith(github.ref, 'refs/tags') }} }
          - { os: ubuntu-latest, arch: x86_64, tagver: '38', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '39', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '310', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '311', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '312', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '313', tagtype: 'manylinux' }
          # x86_64 - musllinux
          - { os: ubuntu-latest, arch: x86_64, tagver: '37', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '38', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '39', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '310', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '311', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '312', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: x86_64, tagver: '313', tagtype: 'musllinux' }
          # aarch64 - manylinux
          - { os: ubuntu-latest, arch: aarch64, tagver: '37', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '38', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '39', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '310', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '311', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '312', tagtype: 'manylinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '313', tagtype: 'manylinux' }
          # aarch64 - musllinux
          - { os: ubuntu-latest, arch: aarch64, tagver: '37', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '38', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '39', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '310', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '311', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '312', tagtype: 'musllinux' }
          - { os: ubuntu-latest, arch: aarch64, tagver: '313', tagtype: 'musllinux' }
          - { os: macos-12, arch: x86_64 }
          - { os: macos-14, arch: arm64 }
          - { os: windows-2019, arch: AMD64 }
          - { os: windows-2019, arch: x86 }

    steps:
      - uses: actions/checkout@v4

      - name: '🛠️ Add msbuild to PATH'
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '16.5'

      - name: '🛠️ Win build dependencies'
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install ninja cmake

      - name: '🛠️ macOS dependencies'
        if: runner.os == 'macOS'
        run: |
          brew install ninja

      # https://cibuildwheel.pypa.io/en/stable/faq/#macos-building-cpython-38-wheels-on-arm64
      - uses: actions/setup-python@v5
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        with:
          python-version: 3.8

      - name: '🛠️ Win MSVC 32 dev cmd setup'
        if: runner.os == 'Windows' && matrix.arch == 'x86'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: '🛠️ Win MSVC 64 dev cmd setup'
        if: runner.os == 'Windows' && matrix.arch == 'AMD64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: '🛠️ Set up QEMU'
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      # NOTE: aarch64 builds are super slow due to QEMU emulation. Making this to parallelize...
      - name: '🚧 cibuildwheel run - Linux - ${{ matrix.arch }} - python ${{ matrix.tagver }} for ${{ matrix.tagtype }}'
        if: matrix.os == 'ubuntu-latest'
        uses: pypa/cibuildwheel@v2.21.2
        env:
          CIBW_BUILD_FRONTEND: build
          CIBW_BUILD: cp${{ matrix.tagver }}*${{ matrix.tagtype }}*
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {package}/tests
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - name: '🚧 cibuildwheel run - Windows'
        if: matrix.os == 'windows-2019'
        uses: pypa/cibuildwheel@v2.21.2
        env:
          CIBW_BUILD_FRONTEND: build
          CIBW_SKIP: '*36*'
          CIBW_BUILD: 'cp*'
          CIBW_ARCHS: "${{ matrix.arch }}"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {package}/tests
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - name: '🚧 cibuildwheel run - macos x86_84'
        if: matrix.os == 'macos-12'
        uses: pypa/cibuildwheel@v2.21.2
        env:
          CIBW_BUILD_FRONTEND: build
          CIBW_SKIP: '*36*'
          CIBW_BUILD: 'cp*'
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {package}/tests
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - name: '🚧 cibuildwheel run - macos arm64'
        if: matrix.os == 'macos-14'
        uses: pypa/cibuildwheel@v2.21.2
        env:
          CIBW_BUILD_FRONTEND: build
          CIBW_SKIP: '*36* *37*'
          CIBW_BUILD: 'cp*'
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {package}/tests
          # https://github.com/pypa/cibuildwheel/pull/1169
          CIBW_TEST_SKIP: "cp38-macosx_*:arm64"
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      # we re-tag cp38 wheel (just an old one) with py2 tag. Hacky but it works...
      - name: '🚧 Python 2.7 wheels re-tagging - Windows'
        if: matrix.os == 'windows-2019'
        run: |
          python -m pip install -U pip wheel && Get-ChildItem -Path wheelhouse/ -Filter *cp38*.whl | Foreach-Object {
            python -m wheel tags --python-tag='py2' --abi-tag=none $_.FullName
          }
      - name: '🚧 Python 2.7 wheels re-tagging - Non-Windows'
        if: matrix.os != 'windows-2019' && matrix.tagver == '38'
        env:
          PIP_BREAK_SYSTEM_PACKAGES: 1
        run: |
          python3 -m pip install -U pip wheel && python3 -m wheel tags --python-tag='py2' --abi-tag=none wheelhouse/*cp38*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Optional, use if you use setuptools_scm
          submodules: true  # Optional, use if you have submodules

      - name: Build SDist
        run: |
          cd bindings/python
          python3 -m pip install -U pip build
          python3 -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          path: bindings/python/dist/*.tar.gz

  publish:
    needs: [ build_wheels, make_sdist ]
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: '📦 Publish distribution to PyPI'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.pypi_pass }}
